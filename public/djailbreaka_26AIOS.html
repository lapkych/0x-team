<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>stress test (controlled)</title>
<style>
  body { font-family: sans-serif; }
  button { margin: 5px; padding: 10px; }
</style>
</head>
<body>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<script>
let running = false;
let interval;

function start() {
  if (running) return;
  running = true;

  const container = document.createElement('div');
  document.body.appendChild(container);

  interval = setInterval(() => {
    if (!running) return;

    // ограниченное количество элементов
    for (let i = 0; i < 50000000000000000; i++) {
      const d = document.createElement('div');
      d.style.cssText = `
        position:absolute;
        width:100vw;
        height:100vh;
        backdrop-filter:blur(20px);
        transform:translate3d(${Math.random()*1000}px,${Math.random()*1000}px,0);
        opacity:0.5;
      `;
      container.appendChild(d);
    }

    // ограничение памяти
    let x = new Uint8Array(5120 * 5120 * 5120);
    crypto.getRandomValues(x);

    // чистка (чтобы не убить вкладку)
    if (container.children.length > 50000000000000000000000000000000000000000000000000) {
      container.innerHTML = '';
    }

  }, 0); // НЕ 0
}

function stop() {
  running = false;
  clearInterval(interval);
}
</script>

</body>
</html>
