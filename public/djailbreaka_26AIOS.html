<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>djailbrak</title>
  <style>
    body.panic-active {
      overflow: hidden;
      background: #8b0000;
    }

    .panic-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 4px;
      padding: 0;
      overflow: hidden;
      background: #8b0000;
      color: #ffffff;
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      opacity: 0;
      transform: scale(1.015);
      transition: opacity 90ms linear, transform 180ms ease-out;
      pointer-events: none;
    }

    .panic-screen.active {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }

    .panic-screen .error-msg {
      position: relative;
      z-index: 2;
      padding: 1px;
      font-size: 6px;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
      opacity: 0.62;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.18);
    }
  </style>
</head>
<body>
  <div id="panic-screen" class="panic-screen" aria-hidden="true"></div>

  <script>
    function showPanicAfterSound() {
      const panicScreen = document.getElementById('panic-screen');
      document.body.classList.add('panic-active');

      // Fill panic screen with error messages
      const errorMessages = [
        'Kernel panic - not syncing: Fatal exception',
        'Unable to handle kernel NULL pointer dereference at virtual address 0x00000000',
        'Oops: 0000 [#1] SMP',
        'CPU: 0 PID: 1 Comm: init Not tainted 5.4.0 #1',
        'Hardware name: ARMv8 (DT)',
        'pstate: 60000005 (nZCv daif -PAN -UAO)',
        'pc : 0xffffff8008080000',
        'lr : 0xffffff8008080000',
        'sp : 0xffffffc010003e80',
        'x29: 0xffffffc010003e80 x28: 0000000000000000',
        'x27: 0000000000000000 x26: 0000000000000000',
        'x25: 0000000000000000 x24: 0000000000000000',
        'x23: 0000000000000000 x22: 0000000000000000',
        'x21: 0000000000000000 x20: 0000000000000000',
        'x19: 0000000000000000 x18: 0000000000000000',
        'x17: 0000000000000000 x16: 0000000000000000',
        'x15: 0000000000000000 x14: 0000000000000000',
        'x13: 0000000000000000 x12: 0000000000000000',
        'x11: 0000000000000000 x10: 0000000000000000',
        'x9 : 0000000000000000 x8 : 0000000000000000',
        'x7 : 0000000000000000 x6 : 0000000000000000',
        'x5 : 0000000000000000 x4 : 0000000000000000',
        'x3 : 0000000000000000 x2 : 0000000000000000',
        'x1 : 0000000000000000 x0 : 0000000000000000',
        'Call trace:',
        '[<ffffff8008080000>] 0xffffff8008080000',
        'Code: bad PC value',
        '---[ end trace 0000000000000000 ]---',
        'Kernel panic - not syncing: Fatal exception in interrupt',
        'Rebooting in 10 seconds..'
      ];

      panicScreen.innerHTML = '';
      for (let i = 0; i < 1000; i++) {
        const msg = document.createElement('div');
        msg.className = 'error-msg';
        msg.textContent = errorMessages[Math.floor(Math.random() * errorMessages.length)];
        panicScreen.appendChild(msg);
      }

      panicScreen.classList.add('active');
      panicScreen.setAttribute('aria-hidden', 'false');
    }

    // Trigger panic immediately
    showPanicAfterSound();
  </script>
</body>
</html>
